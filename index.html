<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>dada runner from F</title>
    <meta name="description" content="Dada Runner from F - An endless runner game with custom character">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            overflow: hidden;
            touch-action: none;
            height: 100%;
            width: 100%;
        }

        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            text-align: center;
            color: #e94560;
            font-size: clamp(14px, 4vw, 28px);
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #6c63ff;
            font-size: clamp(7px, 2vw, 10px);
            margin-bottom: 10px;
            opacity: 0.8;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            max-width: 900px;
            border: 2px solid #16213e;
            border-radius: 10px;
            box-shadow:
                0 0 30px rgba(108, 99, 255, 0.15),
                0 0 60px rgba(233, 69, 96, 0.08),
                inset 0 0 60px rgba(0, 0, 0, 0.2);
            image-rendering: auto;
        }

        .controls-info {
            text-align: center;
            color: #8888aa;
            font-size: clamp(6px, 1.8vw, 8px);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .controls-info span {
            color: #e94560;
        }

        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 16px;
            left: 0;
            right: 0;
            justify-content: space-around;
            padding: 0 20px;
            z-index: 10;
        }

        .mobile-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(108, 99, 255, 0.15);
            border: 2px solid rgba(108, 99, 255, 0.4);
            color: #e94560;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            transition: transform 0.1s;
        }

        .mobile-btn:active {
            transform: scale(0.9);
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
        }

        .skin-selector {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 50;
        }

        .skin-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(108, 99, 255, 0.6);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .skin-btn:active, .skin-btn:hover {
            transform: scale(1.15);
            border-color: #e94560;
        }

        @media (max-width: 600px) {
            .game-wrapper {
                padding: 4px;
            }

            .title {
                margin-bottom: 4px;
            }

            .subtitle {
                margin-bottom: 6px;
            }

            .controls-info {
                display: none;
            }

            .mobile-controls {
                display: flex;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .title { display: none; }
            .subtitle { display: none; }
            .controls-info { display: none; }
            .game-wrapper { padding: 2px; }
        }

        @keyframes popupGif {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            10% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            15% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            85% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
        .anim-popup {
            animation: popupGif 1s ease-in-out forwards;
        }
    </style>
</head>

<body>
    <div class="game-wrapper">
        <div class="skin-selector">
            <div class="skin-btn" style="background-image: url('player.jpg')" onclick="changeSkin('player.jpg')"></div>
            <div class="skin-btn" style="background-image: url('skin1.jpg')" onclick="changeSkin('skin1.jpg')"></div>
            <div class="skin-btn" style="background-image: url('skin2.jpg')" onclick="changeSkin('skin2.jpg')"></div>
            <div class="skin-btn" style="background-image: url('skin3.jpg')" onclick="changeSkin('skin3.jpg')"></div>
        </div>
        <div class="title">dada runner from F</div>
        <div class="subtitle">— ENDLESS RUNNER GAME —</div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls-info">
            PRESS <span>SPACE</span> / <span>↑</span> TO JUMP &nbsp;|&nbsp; <span>↓</span> TO DUCK &nbsp;|&nbsp;
            <span>TAP</span> SCREEN TO PLAY
        </div>
    </div>

    <div class="mobile-controls">
        <button class="mobile-btn" id="btnDuck">DUCK</button>
        <button class="mobile-btn" id="btnJump">JUMP</button>
    </div>

    <!-- 67 Joke GIF -->
    <img id="catGif" src="67.gif" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; max-height: 40vh; max-width: 40vw; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.8); pointer-events: none;" />

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function changeSkin(src) {
            playerImg.src = src;
        }

        // --- Responsive canvas sizing ---
        const BASE_W = 800;
        const BASE_H = 300;
        let scale = 1;

        function resizeCanvas() {
            const wrapper = document.querySelector('.game-wrapper');
            const maxW = Math.min(wrapper.clientWidth - 8, 900);
            scale = maxW / BASE_W;
            canvas.width = BASE_W;
            canvas.height = BASE_H;
            canvas.style.width = maxW + 'px';
            canvas.style.height = (BASE_H * scale) + 'px';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Load player image
        const playerImg = new Image();
        playerImg.src = 'player.jpg';

        // Game state
        const GROUND_Y = BASE_H - 60;
        let gameState = 'waiting'; // waiting, playing, dead
        let score = 0;
        let highScore = parseInt(localStorage.getItem('dinoHighScore') || '0');
        let speed = 6;
        let frameCount = 0;
        let jumpScareTimer = 0;

        // Player
        const player = {
            x: 80,
            y: GROUND_Y,
            w: 50,
            h: 55,
            vy: 0,
            jumping: false,
            ducking: false,
            duckH: 30,
            gravity: 0.7,
            jumpForce: -14,
            grounded: true
        };

        // Obstacles
        let obstacles = [];
        let obstacleTimer = 0;
        const MIN_GAP = 55;

        // Birds
        let birds = [];
        let birdTimer = 0;

        // Particles
        let particles = [];
        let clouds = [];
        let stars = [];

        // Init stars
        for (let i = 0; i < 40; i++) {
            stars.push({
                x: Math.random() * BASE_W,
                y: Math.random() * (GROUND_Y - 20),
                r: Math.random() * 1.5 + 0.5,
                twinkle: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.02 + 0.01
            });
        }

        // Init clouds
        for (let i = 0; i < 4; i++) {
            clouds.push({
                x: Math.random() * BASE_W,
                y: Math.random() * 80 + 20,
                w: Math.random() * 60 + 40,
                speed: Math.random() * 0.3 + 0.1,
                opacity: Math.random() * 0.08 + 0.03
            });
        }

        // Spawn obstacle
        function spawnObstacle() {
            const types = [
                { w: 20, h: 40 },
                { w: 15, h: 50 },
                { w: 30, h: 35 }
            ];
            const t = types[Math.floor(Math.random() * types.length)];
            obstacles.push({
                x: BASE_W + 20,
                y: GROUND_Y - t.h + player.h,
                w: t.w,
                h: t.h
            });
        }

        // Spawn bird
        function spawnBird() {
            birds.push({
                x: BASE_W + 20,
                y: GROUND_Y - 50 - Math.random() * 30,
                w: 35,
                h: 20,
                wingAngle: 0
            });
        }

        // Add particle
        function addParticle(x, y, color, count, vxRange, vyRange) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * (vxRange || 4),
                    vy: (Math.random() - 1) * (vyRange || 4),
                    life: 1,
                    decay: Math.random() * 0.03 + 0.02,
                    color: color,
                    size: Math.random() * 3 + 1
                });
            }
        }

        // Collision check
        function collides(a, b) {
            return a.x < b.x + b.w &&
                a.x + a.w > b.x &&
                a.y < b.y + b.h &&
                a.y + a.h > b.y;
        }

        // Draw player
        function drawPlayer() {
            const h = player.ducking ? player.duckH : player.h;
            const y = player.ducking ? GROUND_Y + player.h - player.duckH : player.y;

            ctx.save();
            // Glow
            ctx.shadowColor = '#6c63ff';
            ctx.shadowBlur = 15;

            // Circle clip
            const cx = player.x + player.w / 2;
            const cy = y + h / 2;
            const r = Math.min(player.w, h) / 2 - 2;

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();

            if (playerImg.complete && playerImg.naturalWidth > 0) {
                ctx.drawImage(playerImg, player.x, y, player.w, h);
            } else {
                ctx.fillStyle = '#e94560';
                ctx.fillRect(player.x, y, player.w, h);
            }
            ctx.restore();

            // Border ring
            ctx.strokeStyle = '#6c63ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, r + 1, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Draw cactus
        function drawCactus(obs) {
            ctx.fillStyle = '#1e8449';
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            // Spines
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(obs.x - 5, obs.y + 8, 8, 4);
            ctx.fillRect(obs.x + obs.w - 3, obs.y + 15, 8, 4);
            ctx.fillRect(obs.x - 4, obs.y + obs.h - 12, 6, 4);
        }

        // Draw bird
        function drawBird(b) {
            ctx.fillStyle = '#e94560';
            ctx.fillRect(b.x + 5, b.y + 6, b.w - 10, b.h - 12);
            // Wings
            const wy = Math.sin(b.wingAngle) * 8;
            ctx.fillStyle = '#ff6b81';
            ctx.beginPath();
            ctx.moveTo(b.x + 8, b.y + 10);
            ctx.lineTo(b.x - 2, b.y + wy);
            ctx.lineTo(b.x + 15, b.y + 10);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(b.x + b.w - 8, b.y + 10);
            ctx.lineTo(b.x + b.w + 2, b.y + wy);
            ctx.lineTo(b.x + b.w - 15, b.y + 10);
            ctx.fill();
            // Eye
            ctx.fillStyle = '#fff';
            ctx.fillRect(b.x + b.w - 12, b.y + 7, 3, 3);
            // Beak
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(b.x + b.w - 5, b.y + 8, 6, 2);
        }

        // Update game
        function update() {
            if (gameState !== 'playing') return;

            frameCount++;
            score++;
            speed = 6 + Math.floor(score / 200) * 0.5;
            if (speed > 16) speed = 16;

            if (Math.floor(score / 5) === 67 && document.getElementById('catGif').style.display === 'none' && jumpScareTimer === 0) {
                const gif = document.getElementById('catGif');
                gif.style.display = 'block';
                gif.classList.remove('anim-popup');
                void gif.offsetWidth; // Reflow
                gif.classList.add('anim-popup');
                jumpScareTimer = 60;
            }
            if (jumpScareTimer > 0) {
                jumpScareTimer--;
                if (jumpScareTimer <= 0) {
                    document.getElementById('catGif').style.display = 'none';
                }
            }

            // Player physics
            if (!player.grounded) {
                player.vy += player.gravity;
                player.y += player.vy;
                if (player.y >= GROUND_Y) {
                    player.y = GROUND_Y;
                    player.grounded = true;
                    player.jumping = false;
                    player.vy = 0;
                    addParticle(player.x + player.w / 2, GROUND_Y + player.h, 'rgba(108,99,255,0.5)', 5, 3, 1);
                }
            }

            // Jump trail
            if (player.jumping) {
                addParticle(player.x + player.w / 2, player.y + player.h, 'rgba(233,69,96,0.4)', 1, 1, 1);
            }

            // Obstacles
            obstacleTimer--;
            if (obstacleTimer <= 0) {
                spawnObstacle();
                obstacleTimer = Math.floor(Math.random() * 40 + MIN_GAP);
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speed;
                if (obstacles[i].x + obstacles[i].w < 0) {
                    obstacles.splice(i, 1);
                    continue;
                }
                // Collision
                const ph = player.ducking ? player.duckH : player.h;
                const py = player.ducking ? GROUND_Y + player.h - player.duckH : player.y;
                if (collides({ x: player.x + 5, y: py + 5, w: player.w - 10, h: ph - 10 }, obstacles[i])) {
                    die();
                }
            }

            // Birds
            birdTimer--;
            if (birdTimer <= 0 && score > 300) {
                spawnBird();
                birdTimer = Math.floor(Math.random() * 100 + 80);
            }

            for (let i = birds.length - 1; i >= 0; i--) {
                birds[i].x -= speed + 1;
                birds[i].wingAngle += 0.2;
                if (birds[i].x + birds[i].w < 0) {
                    birds.splice(i, 1);
                    continue;
                }
                const ph = player.ducking ? player.duckH : player.h;
                const py = player.ducking ? GROUND_Y + player.h - player.duckH : player.y;
                if (collides({ x: player.x + 5, y: py + 5, w: player.w - 10, h: ph - 10 }, birds[i])) {
                    die();
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= particles[i].decay;
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Clouds
            clouds.forEach(c => {
                c.x -= c.speed;
                if (c.x + c.w < 0) {
                    c.x = BASE_W + 20;
                    c.y = Math.random() * 80 + 20;
                }
            });
        }

        function die() {
            gameState = 'dead';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dinoHighScore', highScore);
            }
            addParticle(player.x + player.w / 2, player.y + player.h / 2, '#e94560', 20, 8, 8);
            addParticle(player.x + player.w / 2, player.y + player.h / 2, '#6c63ff', 15, 6, 6);
        }

        function jump() {
            if (gameState === 'waiting') {
                gameState = 'playing';
            }
            if (gameState === 'dead') {
                reset();
                return;
            }
            if (player.grounded && gameState === 'playing') {
                player.vy = player.jumpForce;
                player.grounded = false;
                player.jumping = true;
            }
        }

        function duckStart() {
            if (gameState === 'waiting') {
                gameState = 'playing';
            }
            if (gameState === 'dead') {
                reset();
                return;
            }
            player.ducking = true;
        }

        function duckEnd() {
            player.ducking = false;
        }

        function reset() {
            gameState = 'playing';
            score = 0;
            speed = 6;
            frameCount = 0;
            player.y = GROUND_Y;
            player.vy = 0;
            player.grounded = true;
            player.jumping = false;
            player.ducking = false;
            obstacles = [];
            birds = [];
            particles = [];
            obstacleTimer = 60;
            birdTimer = 200;
            jumpScareTimer = 0;
            document.getElementById('catGif').style.display = 'none';
        }

        // Draw
        function draw() {
            // Background
            const gradient = ctx.createLinearGradient(0, 0, 0, BASE_H);
            gradient.addColorStop(0, '#0f0f1a');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, BASE_W, BASE_H);

            // Stars
            stars.forEach(s => {
                s.twinkle += s.speed;
                const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            });

            // Clouds
            clouds.forEach(c => {
                ctx.fillStyle = `rgba(108,99,255,${c.opacity})`;
                ctx.beginPath();
                ctx.ellipse(c.x + c.w / 2, c.y, c.w / 2, 12, 0, 0, Math.PI * 2);
                ctx.fill();
            });

            // Ground
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, GROUND_Y + player.h, BASE_W, BASE_H - GROUND_Y - player.h);
            ctx.strokeStyle = '#6c63ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y + player.h);
            ctx.lineTo(BASE_W, GROUND_Y + player.h);
            ctx.stroke();

            // Ground detail
            ctx.fillStyle = 'rgba(108,99,255,0.15)';
            for (let i = 0; i < BASE_W; i += 20) {
                const offset = (frameCount * speed) % 20;
                ctx.fillRect(i - offset, GROUND_Y + player.h + 5, 8, 1);
                ctx.fillRect(i - offset + 10, GROUND_Y + player.h + 12, 5, 1);
            }

            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;

            // Obstacles
            obstacles.forEach(drawCactus);

            // Birds
            birds.forEach(drawBird);

            // Player
            drawPlayer();

            // Score
            ctx.fillStyle = '#ffffff';
            ctx.font = '14px "Press Start 2P"';
            ctx.textAlign = 'right';
            ctx.fillText(String(Math.floor(score / 5)).padStart(5, '0'), BASE_W - 20, 30);

            ctx.fillStyle = '#8888aa';
            ctx.font = '10px "Press Start 2P"';
            ctx.fillText('HI ' + String(highScore).padStart(5, '0'), BASE_W - 20, 48);

            // Waiting screen
            if (gameState === 'waiting') {
                ctx.fillStyle = 'rgba(15,15,26,0.6)';
                ctx.fillRect(0, 0, BASE_W, BASE_H);
                ctx.fillStyle = '#e94560';
                ctx.font = '16px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText('TAP or SPACE', BASE_W / 2, BASE_H / 2 - 10);
                ctx.fillStyle = '#6c63ff';
                ctx.font = '10px "Press Start 2P"';
                ctx.fillText('to start', BASE_W / 2, BASE_H / 2 + 15);
            }

            // Dead screen
            if (gameState === 'dead') {
                ctx.fillStyle = 'rgba(15,15,26,0.65)';
                ctx.fillRect(0, 0, BASE_W, BASE_H);
                ctx.fillStyle = '#e94560';
                ctx.font = '20px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', BASE_W / 2, BASE_H / 2 - 20);
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px "Press Start 2P"';
                ctx.fillText('Score: ' + Math.floor(score / 5), BASE_W / 2, BASE_H / 2 + 10);
                ctx.fillStyle = '#6c63ff';
                ctx.font = '10px "Press Start 2P"';
                ctx.fillText('TAP or SPACE to retry', BASE_W / 2, BASE_H / 2 + 35);
            }
        }

        // Game loop
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // --- CONTROLS ---

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                jump();
            }
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                duckStart();
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowDown') {
                duckEnd();
            }
        });

        // Touch – tap canvas to jump
        let touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartY = e.touches[0].clientY;
            jump();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const dy = e.touches[0].clientY - touchStartY;
            if (dy > 30) {
                duckStart();
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            duckEnd();
        }, { passive: false });

        // Click on canvas
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            jump();
        });

        // Mobile buttons
        const btnJump = document.getElementById('btnJump');
        const btnDuck = document.getElementById('btnDuck');

        btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, { passive: false });
        btnDuck.addEventListener('touchstart', (e) => { e.preventDefault(); duckStart(); }, { passive: false });
        btnDuck.addEventListener('touchend', (e) => { e.preventDefault(); duckEnd(); }, { passive: false });
        btnJump.addEventListener('click', (e) => { e.preventDefault(); jump(); });
        btnDuck.addEventListener('mousedown', (e) => { e.preventDefault(); duckStart(); });
        btnDuck.addEventListener('mouseup', (e) => { e.preventDefault(); duckEnd(); });

        // Prevent scroll on mobile
        document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        // Start
        loop();
    </script>
</body>

</html>
